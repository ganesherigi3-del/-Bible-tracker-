
<!DOCTYPE html>
<html>
<head>
<title>Bible Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family: Arial;
background:#0b5ed7;
color:white;
text-align:center;
padding:20px;
}

.box{
background:white;
color:black;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
}

button{
background:#0b5ed7;
color:white;
padding:10px;
border:none;
border-radius:8px;
}

.progress{
background:#ddd;
height:10px;
border-radius:10px;
margin-top:10px;
}

.bar{
background:#0b5ed7;
height:10px;
width:0%;
border-radius:10px;
}
</style>
</head>

<body>

<h2>✝ Bible Tracker</h2>
<p>Grow with God's Word</p>

<div class="box">

<h3 id="today"></h3>

<button onclick="done()">Mark Completed</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<p id="percent"></p>

</div>

<script>

const bible=[
"Genesis 1","Genesis 2","Genesis 3",
"Matthew 1","Matthew 2",
"John 1","Romans 1","Revelation 1"
];

let doneList=JSON.parse(localStorage.getItem("done"))||[];

let today=bible[doneList.length];

document.getElementById("today").innerText="Today's Reading: "+today;

function done(){
doneList.push(today);
localStorage.setItem("done",JSON.stringify(doneList));
update();
}

function update(){
let p=Math.round((doneList.length/bible.length)*100);
document.getElementById("bar").style.width=p+"%";
document.getElementById("percent").innerText=p+"% completed";
}

update();

</script>

</body>
  </html>
